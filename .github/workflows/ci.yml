name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AWS_DEFAULT_REGION: us-west-2

jobs:
  # ---------------------------------------------------------------------------
  # Lint + type check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev tools
        run: pip install ruff black mypy

      - name: ruff
        run: ruff check src/ ingestion_pipeline.py stream_processing.py

      - name: black
        run: black --check src/ ingestion_pipeline.py stream_processing.py

      - name: mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # warn only during initial setup

  # ---------------------------------------------------------------------------
  # Unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      kafka:
        image: bitnami/kafka:3.6
        ports:
          - 9092:9092
        env:
          KAFKA_CFG_NODE_ID: 1
          KAFKA_CFG_PROCESS_ROLES: broker,controller
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          ALLOW_PLAINTEXT_LISTENER: "yes"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          DUCKDB_PATH: /tmp/test_telemetry.duckdb
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Terraform validate
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Init (local only, no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform
        run: terraform validate

      - name: Format check
        working-directory: terraform
        run: terraform fmt -check -recursive

  # ---------------------------------------------------------------------------
  # Build & push Docker image (main branch only)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — add registry config to enable)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: av-telemetry-analytics:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
